name: Instrumented Tests

# Runs the androidTest suite (tests/ source set, AndroidJUnitRunner) on an emulator.
# These are heavier/slower than unit tests, so they run on PRs and on demand rather than every push.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: instrumented-${{ github.ref }}
  cancel-in-progress: true

jobs:
  instrumented-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        api-level: [ 30 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false   # initialized manually below (huggingface rate-limits clones)
          fetch-depth: 0

      - name: Init submodules (with retry/backoff)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            git config --global url."https://hf:${HF_TOKEN}@huggingface.co/".insteadOf "https://huggingface.co/"
            echo "Configured authenticated huggingface.co access."
          else
            echo "::warning::No HF_TOKEN secret set — cloning the huggingface submodule anonymously (429-prone)."
          fi
          tries=6
          for i in $(seq 1 $tries); do
            if git submodule update --init --recursive --force --jobs 4; then
              echo "Submodules initialized."; exit 0
            fi
            if [ "$i" -lt "$tries" ]; then
              wait=$((i * 30))
              echo "::warning::Submodule init attempt $i/$tries failed (likely huggingface 429) — retrying in ${wait}s"
              sleep "$wait"
            fi
          done
          echo "::error::Submodule init failed after $tries attempts"; exit 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provision Android SDK (NDK, CMake, platform, build-tools)
        run: ./.ci/setup-android-sdk.sh

      # The emulator needs hardware acceleration (KVM), which GitHub-hosted Linux runners provide
      # but is not group-accessible by default.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew connectedUnstableDebugAndroidTest --stacktrace

      - name: Upload androidTest reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-reports-api${{ matrix.api-level }}
          path: build/reports/androidTests/**
          if-no-files-found: ignore
