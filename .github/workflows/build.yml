name: Build & Unit Tests

# Builds the debug APK, runs lint and JVM unit tests. The debug variant is signed with the
# auto-generated debug keystore, so no signing secrets are required.

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false   # initialized manually below (huggingface rate-limits clones)
          fetch-depth: 0       # full history so `git describe` can derive the version

      - name: Init submodules (with retry/backoff)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            git config --global url."https://hf:${HF_TOKEN}@huggingface.co/".insteadOf "https://huggingface.co/"
            echo "Configured authenticated huggingface.co access."
          else
            echo "::warning::No HF_TOKEN secret set — cloning the huggingface submodule anonymously (429-prone)."
          fi
          tries=6
          for i in $(seq 1 $tries); do
            if git submodule update --init --recursive --force --jobs 4; then
              echo "Submodules initialized."; exit 0
            fi
            if [ "$i" -lt "$tries" ]; then
              wait=$((i * 30))
              echo "::warning::Submodule init attempt $i/$tries failed (likely huggingface 429) — retrying in ${wait}s"
              sleep "$wait"
            fi
          done
          echo "::error::Submodule init failed after $tries attempts"; exit 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provision Android SDK (NDK, CMake, platform, build-tools)
        run: ./.ci/setup-android-sdk.sh

      # Note: no `lint` gate. Upstream doesn't run lint in CI and the codebase carries thousands
      # of pre-existing lint errors with no baseline, so it can't act as a pass/fail gate here.
      - name: Unit tests (unstable debug)
        run: ./gradlew testUnstableDebugUnitTest --stacktrace

      - name: Assemble unstable debug APK
        run: ./gradlew assembleUnstableDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: latinime-unstable-debug
          path: build/outputs/apk/unstable/debug/*.apk
          if-no-files-found: warn

      - name: Upload lint & test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            build/reports/lint-results-*.html
            build/reports/tests/**
          if-no-files-found: ignore
