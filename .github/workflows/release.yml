name: Release

# Builds the signed, minified `stable` release APK and attaches it to a GitHub Release.
# Trigger by pushing a tag like `v1.2.3` (or run manually for a test build).
#
# Required repository secrets (Settings → Secrets and variables → Actions) for a properly signed
# build — without them the APK falls back to the shared debug key (installable, but debug-signed):
#   KEYSTORE_FILE      base64 of your release keystore (.jks):  base64 -w0 key.jks
#   KEYSTORE_PASSWORD  keystore (store) password
#   KEY_PASSWORD       key password
#   KEYSTORE_ALIAS     key alias

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # create/upload GitHub Release assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0   # full history + tags so `git describe` derives the version

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Provision Android SDK (NDK, CMake, platform, build-tools)
        run: ./.ci/setup-android-sdk.sh

      - name: Configure release signing
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        run: |
          if [ -n "$KEYSTORE_FILE" ]; then
            echo "$KEYSTORE_FILE" | base64 --decode > key.jks
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEYSTORE_ALIAS"
              echo "storeFile=key.jks"
            } > keystore.properties
            echo "Release signing configured from secrets."
          else
            echo "::warning::KEYSTORE_FILE secret not set — APK will be signed with the shared debug key."
          fi

      - name: Build stable release APK
        run: ./gradlew assembleStableRelease --stacktrace

      - name: Locate APK
        id: apk
        run: echo "path=$(ls build/outputs/apk/stable/release/*.apk | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: stable-release-apk
          path: build/outputs/apk/stable/release/*.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Clean up signing material
        if: always()
        run: rm -f key.jks keystore.properties
